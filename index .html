<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas Pokémon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Mewtwo -->
        <div class="card">
            <div class="pokemon">
                <img src="img/mewtwo.jpg" alt="Mewtwo GX">
            </div>

            <button class="btn-topo">Mewtwo GX</button>

            <div class="botoes">
                <button class="ler-mais">Ler Mais</button>
                <button class="contato">Contato</button>
            </div>
        </div>

        <!-- Pikachu -->
        <div class="card">
            <div class="pokemon">
                <img src="img/pikachu.jpg" alt="Pikachu GX">
            </div>

            <button class="btn-topo">Pikachu GX</button>

            <div class="botoes">
                <button class="ler-mais">Ler Mais</button>
                <button class="contato">Contato</button>
            </div>
        </div>

        <!-- Charizard -->
        <div class="card">
            <div class="pokemon">
                <img src="img/charizard.jpg" alt="Charizard GX">
            </div>

            <button class="btn-topo">Charizard GX</button>

            <div class="botoes">
                <button class="ler-mais">Ler Mais</button>
                <button class="contato">Contato</button>
            </div>
        </div>

    </div>

</body>
</html>
